services:
  # Backend API
  - type: web
    name: eco-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # You set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # You set this manually in Render dashboard
      - key: PORT
        value: 5000

  # Frontend
  - type: web
    name: eco-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # Set to your backend URL: https://eco-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
